<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoWN Horse License Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#1a1a2e;--card:#16213e;--accent:#D4A04A;--green:#27ae60;--red:#e74c3c;
  --blue:#2980b9;--text:#e0e0e0;--muted:#888;--border:#2a2a4a
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--card);border-bottom:2px solid var(--accent);padding:.75rem 1.5rem;text-align:center}
.hdr-logo{height:48px}
.hdr span{display:block;font-family:'Oswald',sans-serif;font-size:.85rem;color:var(--accent);letter-spacing:.08em;margin-top:.15rem}
.tabs{display:flex;gap:.25rem;background:var(--card);padding:.25rem .5rem;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{background:none;border:none;color:var(--muted);padding:.5rem .75rem;cursor:pointer;font-size:.8rem;font-family:'Oswald',sans-serif;white-space:nowrap;border-radius:4px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);background:rgba(212,160,74,.1)}
.main{max-width:1100px;margin:0 auto;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card-hdr h2{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.3rem;margin-bottom:.25rem}
.card-hdr p{color:var(--muted);font-size:.85rem}
.search-wrap{position:relative;margin:.75rem 0}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-box{width:100%;padding:.6rem .6rem .6rem 2.2rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.9rem}
.search-box:focus{outline:none;border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.75rem;margin:.75rem 0}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center}
.stat .num{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700}
.stat .lbl{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.gold-stat .num{color:var(--accent)}
.green-stat .num{color:var(--green)}
.blue-stat .num{color:var(--blue)}
.total-stat .num{color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;cursor:pointer;white-space:nowrap}
td{padding:.5rem;border-bottom:1px solid var(--border)}
.ctr{text-align:center}
.bold{font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-year{background:rgba(212,160,74,.15);color:var(--accent)}
.badge-send{background:rgba(39,174,96,.2);color:#2ecc71;border:1px solid #2ecc71}
.badge-sent{background:rgba(39,174,96,.1);color:var(--green)}
.badge-none{background:rgba(136,136,136,.1);color:var(--muted)}
.btn{display:inline-block;padding:.4rem .8rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:'Source Sans 3',sans-serif}
.btn-accent{background:var(--accent);color:#1a1a1a}
.btn-dark{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:.25rem .5rem;font-size:.75rem}
.btn:disabled{opacity:.5;cursor:default}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.pills{display:flex;gap:.25rem;flex-wrap:wrap}
.pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.25rem .6rem;font-size:.75rem;cursor:pointer;color:var(--muted)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(212,160,74,.1)}
.empty{color:var(--muted);text-align:center;padding:2rem}
.hidden{display:none!important}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:580px;width:100%;max-height:90vh;overflow-y:auto}
#pwd-gate{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
#pwd-gate div{background:var(--card);padding:2rem;border-radius:12px;text-align:center}
#pwd-input{padding:.5rem;margin:.5rem 0;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);text-align:center}
/* License card print styles */
@media print{
  body{background:#fff;color:#000}
  .license-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* Setup guide */
.setup-step{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.75rem}
.setup-step h4{font-family:'Oswald',sans-serif;color:var(--accent);margin-bottom:.4rem}
.setup-step p,.setup-step li{font-size:.85rem;color:var(--muted);line-height:1.6}
.setup-step ul{margin-left:1.2rem}
.setup-step code{background:rgba(212,160,74,.1);color:var(--accent);padding:1px 6px;border-radius:4px;font-size:.8rem}
</style>
</head>
<body>

<div class="hdr">
  <img id="hdr-logo" class="hdr-logo" alt="CoWN">
  <span>HORSE LICENSE HUB</span>
</div>
<div class="tabs" id="tabs"></div>

<div id="pwd-gate" class="hidden">
  <div>
    <p style="font-family:Oswald;color:var(--accent)">Admin Access</p>
    <input type="password" id="pwd-input" placeholder="Enter password">
    <br><button class="btn btn-accent" id="pwd-btn">Unlock</button>
    <button class="btn btn-dark" id="pwd-cancel" style="margin-left:.5rem">Cancel</button>
  </div>
</div>

<div class="main">
  <div id="loading-view"><div class="card"><p class="empty">Loading horse license data...</p></div></div>
  <div id="lookup-view"  class="hidden"></div>
  <div id="dashboard-view" class="hidden"></div>
  <div id="licenses-view" class="hidden"></div>
  <div id="setup-view"  class="hidden"></div>
  <div id="settings-view" class="hidden"></div>
</div>
<div id="modal-root"></div>

// ===== HELPERS =====
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function currentYear(){ return new Date().getFullYear(); }

function parseSentStatus(raw){
  var s = String(raw||"").trim().toLowerCase();
  if(s === "send") return "send";
  if(s.indexOf("sent") === 0) return "sent";
  return "";
}

function sentBadge(h){
  if(h.sentStatus === "send") return "<span class='badge badge-send'>&#9993; Send</span>";
  if(h.sentStatus === "sent") return "<span class='badge badge-sent'>&#10003; Sent</span>";
  return "<span class='badge badge-none'>—</span>";
}

function ownerBadge(h){
  if(h.ownerFound === false)
    return " <span class='badge' style='background:rgba(231,76,60,.15);color:var(--red)' title='Owner name not found in membership sheet'>&#9888; No match</span>";
  if(h.ownerCownNum)
    return " <span class='badge badge-year'>#"+esc(h.ownerCownNum)+"</span>";
  return "";
}

// ===== PARSE DATA =====
// Called when proxy returns JSON (merged server-side by Apps Script)
function parseHorseJSON(data){
  var raw = data.horses || [];
  console.log("Received " + raw.length + " horse licenses from proxy. Member index size: " + (data.memberCount || "?"));
  // The proxy already did the merge — just normalise sentStatus client-side
  // in case the sheet value changed since the proxy built the object
  raw.forEach(function(h){
    h.sentStatus = parseSentStatus(h.sentRaw || h.sentStatus || "");
  });
  return raw.sort(function(a,b){ return a.owner.localeCompare(b.owner) || a.horse.localeCompare(b.horse); });
}

// Called when user manually uploads an xlsx file (fallback path — no member merge)
function parseHorseXLSX(wb){
  var horses = [];
  var shName = wb.SheetNames.find(function(n){
    return n.toLowerCase().indexOf("horse") > -1 || n.toLowerCase().indexOf("license") > -1;
  }) || wb.SheetNames[0];

  var raw = XLSX.utils.sheet_to_json(wb.Sheets[shName], { defval: null });
  if(raw.length > 0) console.log("Horse sheet columns:", Object.keys(raw[0]));

  for(var i = 0; i < raw.length; i++){
    var row = raw[i];
    var lk = {};
    Object.keys(row).forEach(function(k){ lk[k.toLowerCase().trim()] = row[k]; });

    var horse = String(lk["horse"] || lk["horse name"] || "").trim();
    var owner = String(lk["owner"] || lk["owner name"] || "").trim();
    if(!horse && !owner) continue;

    var rawSent = String(lk["sent"] || "").trim();
    horses.push({
      horse:        horse,
      owner:        owner,
      horseNum:     String(lk["cown horse number"] || lk["cown horse #"] || lk["horse number"] || lk["horse #"] || "").trim(),
      ownerCownNum: "",
      ownerEmail:   String(lk["email"] || lk["recipient"] || "").trim(),
      rider:        String(lk["rider"] || lk["rider name"] || "").trim(),
      riderCownNum: "",
      riderEmail:   "",
      year:         parseInt(lk["year"] || lk["license year"] || lk["yr"] || 0) || currentYear(),
      licNum:       String(lk["license #"] || lk["license number"] || lk["lic #"] || "").trim(),
      sentStatus:   parseSentStatus(rawSent),
      sentRaw:      rawSent,
      rowIndex:     i,
      ownerFound:   true,
      riderFound:   true
    });
  }
  console.log("Parsed " + horses.length + " horse licenses from file (no member merge)");
  return horses.sort(function(a,b){ return a.owner.localeCompare(b.owner) || a.horse.localeCompare(b.horse); });
}

// ===== TABS & VIEWS =====
function renderTabs(){
  var tabs = [{ id:"lookup", l:"Horse Lookup" }];
  if(S.adminUnlocked) tabs.push({ id:"dashboard", l:"Dashboard" }, { id:"licenses", l:"Licenses" }, { id:"setup", l:"Setup Guide" }, { id:"settings", l:"Settings" });
  var h = tabs.map(function(t){
    return "<button class='tab"+(S.view===t.id?" active":"")+"' data-view='"+t.id+"'>"+t.l+"</button>";
  }).join("");
  if(!S.adminUnlocked) h += "<button class='tab' id='admin-unlock-btn' style='margin-left:auto;color:var(--muted)'>Admin</button>";
  document.getElementById("tabs").innerHTML = h;
  document.querySelectorAll(".tab").forEach(function(b){
    if(b.dataset.view) b.addEventListener("click", function(){ showView(b.dataset.view); });
  });
  var u = document.getElementById("admin-unlock-btn");
  if(u) u.addEventListener("click", function(){
    S.pendingView = "dashboard";
    document.getElementById("pwd-gate").classList.remove("hidden");
    document.getElementById("pwd-input").focus();
  });
}

function showView(v){
  var needsPwd = ["dashboard","licenses","setup","settings"];
  if(needsPwd.indexOf(v) > -1 && !S.adminUnlocked){
    S.pendingView = v;
    document.getElementById("pwd-gate").classList.remove("hidden");
    document.getElementById("pwd-input").focus();
    return;
  }
  S.view = v;
  ["loading","lookup","dashboard","licenses","setup","settings"].forEach(function(id){
    document.getElementById(id+"-view").classList.toggle("hidden", id !== v);
  });
  renderTabs();
  if(v === "lookup")    renderLookup();
  if(v === "dashboard") renderDashboard();
  if(v === "licenses")  renderLicenses();
  if(v === "setup")     renderSetup();
  if(v === "settings")  renderSettings();
}

// Password gate
document.getElementById("pwd-btn").addEventListener("click", function(){
  if(document.getElementById("pwd-input").value === CONFIG.password){
    S.adminUnlocked = true;
    document.getElementById("pwd-gate").classList.add("hidden");
    document.getElementById("pwd-input").value = "";
    showView(S.pendingView || "dashboard");
  } else { alert("Wrong password"); }
});
document.getElementById("pwd-cancel").addEventListener("click", function(){
  document.getElementById("pwd-gate").classList.add("hidden");
  document.getElementById("pwd-input").value = "";
});
document.getElementById("pwd-input").addEventListener("keydown", function(e){ if(e.key === "Enter") document.getElementById("pwd-btn").click(); });

// ===== LOOKUP =====
function renderLookup(){
  var el = document.getElementById("lookup-view");
  el.innerHTML = "<div class='card'><div class='card-hdr'><h2>Horse License Lookup</h2><p>Search by horse name, owner, rider, or CoWN number</p></div>"
    +"<div class='search-wrap'><span class='search-icon'>&#128269;</span><input class='search-box' id='lookup-q' placeholder='Enter horse, owner, rider, or year...'></div>"
    +"<div id='lookup-results'></div></div>";

  document.getElementById("lookup-q").addEventListener("input", function(){
    var q = this.value.trim().toLowerCase();
    var res = document.getElementById("lookup-results");
    if(q.length < 2){ res.innerHTML = ""; return; }
    var matches = S.horses.filter(function(h){
      return h.horse.toLowerCase().indexOf(q) > -1
          || h.owner.toLowerCase().indexOf(q) > -1
          || h.rider.toLowerCase().indexOf(q) > -1
          || h.cownNum.toLowerCase().indexOf(q) > -1;
    });
    if(!matches.length){ res.innerHTML = "<p class='empty'>No licenses found</p>"; return; }
    var t = "<table><thead><tr><th>Horse</th><th>Owner</th><th>Owner CoWN #</th><th>Rider</th><th>Year</th><th></th></tr></thead><tbody>";
    matches.slice(0, 25).forEach(function(h){
      t += "<tr><td class='bold'>"+esc(h.horse)+"</td><td>"+esc(h.owner)+ownerBadge(h)+"</td>"
         +"<td class='ctr'>"+esc(h.ownerCownNum||"—")+"</td><td>"+esc(h.rider)+"</td>"
         +"<td class='ctr'><span class='badge badge-year'>"+h.year+"</span></td>"
         +"<td><button class='btn btn-accent btn-sm view-lic-btn' data-idx='"+h.rowIndex+"'>View License</button></td></tr>";
    });
    t += "</tbody></table>";
    res.innerHTML = t;
    res.querySelectorAll(".view-lic-btn").forEach(function(b){
      b.addEventListener("click", function(){
        var idx = parseInt(this.dataset.idx);
        var horse = S.horses.find(function(h){ return h.rowIndex === idx; });
        if(horse) showLicenseModal(horse);
      });
    });
  });
}

// ===== DASHBOARD =====
function renderDashboard(){
  var el = document.getElementById("dashboard-view");
  var byYear = {};
  S.horses.forEach(function(h){ byYear[h.year] = (byYear[h.year]||0) + 1; });
  var years = Object.keys(byYear).sort(function(a,b){ return b - a; });

  var queued = S.horses.filter(function(h){ return h.sentStatus === "send"; });
  var sent   = S.horses.filter(function(h){ return h.sentStatus === "sent"; });

  var h = "<div class='card'><div class='card-hdr'><h2>Dashboard</h2><p>Overview of all horse licenses</p></div>";
  h += "<div class='stats'>";
  h += "<div class='stat total-stat'><div class='num'>"+S.horses.length+"</div><div class='lbl'>Total Licenses</div></div>";
  h += "<div class='stat gold-stat'><div class='num'>"+currentYear()+"</div><div class='lbl'>Current Year</div></div>";
  h += "<div class='stat green-stat'><div class='num'>"+queued.length+"</div><div class='lbl'>Queued to Send</div></div>";
  h += "<div class='stat blue-stat'><div class='num'>"+sent.length+"</div><div class='lbl'>Already Sent</div></div>";
  h += "</div>";

  // Year breakdown
  if(years.length > 1){
    h += "<div style='margin:.75rem 0'><table><thead><tr><th>Year</th><th>Licenses</th></tr></thead><tbody>";
    years.forEach(function(y){
      h += "<tr><td><span class='badge badge-year'>"+y+"</span></td><td>"+byYear[y]+"</td></tr>";
    });
    h += "</tbody></table></div>";
  }

  // Full list
  h += "<div class='search-wrap'><span class='search-icon'>&#128269;</span><input class='search-box' id='dash-q' placeholder='Search all licenses...'></div>";
  h += "<div id='dash-table'></div></div>";
  el.innerHTML = h;

  function renderTable(){
    var q = (document.getElementById("dash-q")||{value:""}).value.trim().toLowerCase();
    var list = q ? S.horses.filter(function(h){
      return h.horse.toLowerCase().indexOf(q) > -1 || h.owner.toLowerCase().indexOf(q) > -1
          || h.rider.toLowerCase().indexOf(q) > -1 || String(h.year).indexOf(q) > -1;
    }) : S.horses;
    var t = "<div style='overflow-x:auto'><table><thead><tr><th>Horse</th><th>Owner</th><th>Owner CoWN #</th><th>Rider</th><th>Year</th><th>License Status</th></tr></thead><tbody>";
    list.slice(0, 100).forEach(function(h){
      t += "<tr class='dash-row' data-idx='"+h.rowIndex+"' style='cursor:pointer'>"
         +"<td class='bold'>"+esc(h.horse)+"</td><td>"+esc(h.owner)+ownerBadge(h)+"</td>"
         +"<td class='ctr'>"+esc(h.ownerCownNum||"—")+"</td><td>"+esc(h.rider)+"</td>"
         +"<td class='ctr'><span class='badge badge-year'>"+h.year+"</span></td>"
         +"<td class='ctr'>"+sentBadge(h)+"</td></tr>";
    });
    t += "</tbody></table></div>";
    if(!list.length) t = "<p class='empty'>No licenses match</p>";
    document.getElementById("dash-table").innerHTML = t;
    document.querySelectorAll(".dash-row").forEach(function(r){
      r.addEventListener("click", function(){
        var idx = parseInt(this.dataset.idx);
        var horse = S.horses.find(function(h){ return h.rowIndex === idx; });
        if(horse) showDetailModal(horse);
      });
    });
  }

  renderTable();
  document.getElementById("dash-q").addEventListener("input", renderTable);
}

// ===== LICENSES (print/send) =====
function renderLicenses(){
  var el = document.getElementById("licenses-view");
  var queued = S.horses.filter(function(h){ return h.sentStatus === "send"; });
  var sent   = S.horses.filter(function(h){ return h.sentStatus === "sent"; });
  var blank  = S.horses.filter(function(h){ return h.sentStatus === ""; });

  var h = "<div class='card'><div class='card-hdr'><h2>Horse Licenses</h2>"
    +"<p>Print or send horse licenses. Set the <strong>Sent</strong> column to <strong>send</strong> to queue a license.</p></div>";

  h += "<div class='stats' style='margin-bottom:1rem'>";
  h += "<div class='stat green-stat'><div class='num'>"+queued.length+"</div><div class='lbl'>Queued to Send</div></div>";
  h += "<div class='stat total-stat'><div class='num'>"+blank.length+"</div><div class='lbl'>No Action</div></div>";
  h += "<div class='stat blue-stat'><div class='num'>"+sent.length+"</div><div class='lbl'>Already Sent</div></div>";
  h += "</div>";

  h += "<div class='btn-row' style='margin-bottom:1rem'>";
  h += "<button class='btn btn-accent' id='batch-print'>&#128424; Print All Licenses</button>";
  if(queued.length > 0)
    h += "<button class='btn btn-green' id='batch-send'>&#9993; Send "+queued.length+" Queued</button>";
  h += "</div>";

  h += "<div class='search-wrap'><span class='search-icon'>&#128269;</span><input class='search-box' id='lic-q' placeholder='Search licenses...'></div>";
  h += "<div class='pills' style='margin-bottom:.75rem'>";
  h += "<button class='pill active' data-lf='all'>All <span class='ct'>("+S.horses.length+")</span></button>";
  h += "<button class='pill' data-lf='send'>Queued <span class='ct'>("+queued.length+")</span></button>";
  h += "<button class='pill' data-lf='sent'>Sent <span class='ct'>("+sent.length+")</span></button>";
  h += "<button class='pill' data-lf=''>No Action <span class='ct'>("+blank.length+")</span></button>";
  h += "</div>";
  h += "<div id='lic-results'></div></div>";
  el.innerHTML = h;

  var licFilter = "all";

  function renderLicList(q){
    var list = S.horses;
    if(licFilter !== "all") list = S.horses.filter(function(h){ return h.sentStatus === licFilter; });
    if(q) list = list.filter(function(h){
      return h.horse.toLowerCase().indexOf(q) > -1 || h.owner.toLowerCase().indexOf(q) > -1 || h.rider.toLowerCase().indexOf(q) > -1;
    });
    var res = document.getElementById("lic-results");
    if(!list.length){ res.innerHTML = "<p class='empty'>No licenses match</p>"; return; }
    var t = "<div style='overflow-x:auto'><table><thead><tr><th>Horse</th><th>Owner</th><th>Owner CoWN #</th><th>Rider</th><th>Year</th><th>Status</th><th></th></tr></thead><tbody>";
    list.slice(0, 60).forEach(function(h){
      t += "<tr><td class='bold'>"+esc(h.horse)+"</td><td>"+esc(h.owner)+ownerBadge(h)+"</td>"
         +"<td class='ctr'>"+esc(h.ownerCownNum||"—")+"</td><td>"+esc(h.rider)+"</td>"
         +"<td class='ctr'><span class='badge badge-year'>"+h.year+"</span></td>"
         +"<td class='ctr'>"+sentBadge(h)+"</td>"
         +"<td><button class='btn btn-dark btn-sm view-lic-btn' data-idx='"+h.rowIndex+"'>View</button>"
         +(h.riderEmail ? " <button class='btn btn-green btn-sm send-lic-btn' data-idx='"+h.rowIndex+"'>&#9993; Send</button>"
                        : " <span style='font-size:.7rem;color:var(--red)'>No email</span>")
         +"</td></tr>";
    });
    t += "</tbody></table></div>";
    res.innerHTML = t;
    res.querySelectorAll(".view-lic-btn").forEach(function(b){
      b.addEventListener("click", function(){
        var idx = parseInt(this.dataset.idx);
        var horse = S.horses.find(function(h){ return h.rowIndex === idx; });
        if(horse) showLicenseModal(horse);
      });
    });
    res.querySelectorAll(".send-lic-btn").forEach(function(b){
      b.addEventListener("click", function(){ sendLicenseEmail(parseInt(this.dataset.idx), this); });
    });
  }

  renderLicList("");
  document.getElementById("lic-q").addEventListener("input", function(){ renderLicList(this.value.trim().toLowerCase()); });
  el.querySelectorAll("[data-lf]").forEach(function(b){
    b.addEventListener("click", function(){
      licFilter = b.dataset.lf;
      el.querySelectorAll("[data-lf]").forEach(function(p){ p.classList.remove("active"); });
      b.classList.add("active");
      renderLicList((document.getElementById("lic-q")||{value:""}).value.trim().toLowerCase());
    });
  });

  document.getElementById("batch-print").addEventListener("click", function(){
    var win = window.open("", "", "width=600,height=800");
    win.document.write("<!DOCTYPE html><html><head>"
      +"<link href='https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap' rel='stylesheet'>"
      +"<style>body{font-family:'Source Sans 3',sans-serif;padding:1rem;background:#fff;color:#333}"
      +"@media print{.license-page{page-break-after:always}.license-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}}"
      +".license-page{max-width:540px;margin:0 auto 2rem;padding:1.5rem}</style></head><body>");
    S.horses.forEach(function(h){ win.document.write("<div class='license-page'>"+buildLicenseHTML(h)+"</div>"); });
    win.document.write("</body></html>");
    win.document.close();
    setTimeout(function(){ win.print(); }, 500);
  });

  var batchBtn = document.getElementById("batch-send");
  if(batchBtn){
    batchBtn.addEventListener("click", function(){
      var q2 = S.horses.filter(function(h){ return h.sentStatus === "send"; });
      if(!q2.length){ alert("No licenses are queued to send."); return; }
      if(!confirm("Send horse licenses to "+q2.length+" entries marked 'send'?")) return;
      var idxs = q2.map(function(h){ return h.rowIndex; });
      sendBatchLicenses(idxs, this);
    });
  }
}

function renderSettings(){
  var el = document.getElementById("settings-view");
  var h = "<div class='card'><div class='card-hdr'><h2>Settings</h2></div>";
  h += "<div class='stats'>";
  h += "<div class='stat total-stat'><div class='num'>"+S.horses.length+"</div><div class='lbl'>Total Licenses</div></div>";
  h += "<div class='stat gold-stat'><div class='num'>"+S.horses.filter(function(h){ return h.year === currentYear(); }).length+"</div><div class='lbl'>This Year</div></div>";
  h += "<div class='stat blue-stat'><div class='num'>"+S.horses.filter(function(h){ return !h.email; }).length+"</div><div class='lbl'>No Email</div></div>";
  h += "</div>";
  h += "<div class='btn-row'>"
     +"<button class='btn btn-accent' id='reload-btn'>Reload from Google Drive</button>"
     +"<label class='btn btn-dark' style='cursor:pointer'>Upload File<input type='file' accept='.xlsx,.xls,.csv' id='file-upload' style='display:none'></label>"
     +"</div>";
  h += "<div class='btn-row' style='margin-top:1rem'>"
     +"<button class='btn btn-dark dl-btn' data-type='all'>Download All</button>"
     +"<button class='btn btn-dark dl-btn' data-type='year'>Download "+currentYear()+"</button>"
     +"</div>";
  h += "<div style='margin-top:1.5rem;padding:1rem;background:var(--bg);border-radius:8px;font-size:.8rem;color:var(--muted);line-height:1.7'>"
     +"<strong style='color:var(--accent)'>Proxy URL in use:</strong><br>"
     +"<code style='color:var(--text);font-size:.75rem;word-break:break-all'>"+CONFIG.proxyUrl+"?type="+CONFIG.sheetType+"</code><br><br>"
     +"<strong style='color:var(--accent)'>Sheet type parameter:</strong> <code>"+CONFIG.sheetType+"</code><br>"
     +"Change <code>CONFIG.sheetType</code> in the HTML source if your proxy uses a different parameter.</div>";
  h += "</div>";
  el.innerHTML = h;

  document.getElementById("reload-btn").addEventListener("click", function(){ autoLoad(); });
  document.getElementById("file-upload").addEventListener("change", function(e){
    var file = e.target.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
      S.horses = parseHorseXLSX(wb);
      showView("dashboard");
    };
    reader.readAsArrayBuffer(file);
  });
  el.querySelectorAll(".dl-btn").forEach(function(b){
    b.addEventListener("click", function(){
      var yr = currentYear();
      var list = b.dataset.type === "year"
        ? S.horses.filter(function(h){ return h.year === yr; })
        : S.horses;
      var data = list.map(function(h){ return { Horse:h.horse, Owner:h.owner, "CoWN Number":h.cownNum, Rider:h.rider, Year:h.year, Email:h.email, Phone:h.phone, Sent:h.sentRaw }; });
      var ws = XLSX.utils.json_to_sheet(data);
      var wb2 = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb2, ws, "Licenses");
      XLSX.writeFile(wb2, "CoWN_HorseLicenses_"+b.dataset.type+".xlsx");
    });
  });
}

// ===== MODALS =====
function showLicenseModal(h){
  var root = document.getElementById("modal-root");
  var html = "<div class='modal-overlay' id='lic-modal'><div class='modal'>";
  html += buildLicenseHTML(h);
  html += "<div class='btn-row' style='margin-top:1rem'>";
  html += "<button class='btn btn-dark' id='lic-close'>Close</button>";
  html += " <button class='btn btn-accent' id='lic-print'>&#128424; Print / Save PDF</button>";
  if(S.adminUnlocked && h.riderEmail)
    html += " <button class='btn btn-green' id='lic-email' data-idx='"+h.rowIndex+"'>&#9993; Send License</button>";
  if(S.adminUnlocked && !h.riderEmail)
    html += " <span style='font-size:.75rem;color:var(--red)'>No email — owner not matched in membership</span>";
  html += "</div></div></div>";
  root.innerHTML = html;

  document.getElementById("lic-close").addEventListener("click", function(){ root.innerHTML=""; });
  document.getElementById("lic-modal").addEventListener("click", function(e){ if(e.target===this) root.innerHTML=""; });
  document.getElementById("lic-print").addEventListener("click", function(){
    var win = window.open("","","width=600,height=700");
    win.document.write("<!DOCTYPE html><html><head>"
      +"<link href='https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap' rel='stylesheet'>"
      +"<style>body{font-family:'Source Sans 3',sans-serif;padding:2rem;background:#fff}"
      +"@media print{.license-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}}"
      +"</style></head><body>");
    win.document.write(buildLicenseHTML(h));
    win.document.write("</body></html>");
    win.document.close();
    setTimeout(function(){ win.print(); }, 500);
  });

  var emailBtn = document.getElementById("lic-email");
  if(emailBtn) emailBtn.addEventListener("click", function(){ sendLicenseEmail(parseInt(this.dataset.idx), this); });
}

function showDetailModal(h){
  var root = document.getElementById("modal-root");
  var html = "<div class='modal-overlay' id='det-modal'><div class='modal'>";
  html += "<h3 style='font-family:Oswald;color:var(--accent)'>"+esc(h.horse)+"</h3>";
  html += "<table style='margin:.75rem 0;font-size:.85rem'><tbody>";
  html += "<tr><td style='color:var(--muted);padding-right:1rem'>Owner</td><td>"+esc(h.owner)+ownerBadge(h)+"</td></tr>";
  html += "<tr><td style='color:var(--muted)'>Owner CoWN #</td><td>"+(h.ownerCownNum||"<span style='color:var(--red)'>Not found in membership</span>")+"</td></tr>";
  html += "<tr><td style='color:var(--muted)'>Rider Email</td><td>"+(h.riderEmail||"<span style='color:var(--red)'>Not found</span>")+"</td></tr></tr>";
  if(h.rider){
    html += "<tr><td style='color:var(--muted)'>Rider</td><td>"+esc(h.rider)+"</td></tr>";
    html += "<tr><td style='color:var(--muted)'>Rider CoWN #</td><td>"+(h.riderCownNum||"<span style='color:var(--muted)'>—</span>")+"</td></tr>";
  }
  html += "<tr><td style='color:var(--muted)'>Horse #</td><td>"+(h.horseNum||"—")+"</td></tr>";
  html += "<tr><td style='color:var(--muted)'>Year</td><td><span class='badge badge-year'>"+h.year+"</span></td></tr>";
  if(h.licNum) html += "<tr><td style='color:var(--muted)'>License #</td><td><code>"+esc(h.licNum)+"</code></td></tr>";
  html += "<tr><td style='color:var(--muted)'>License Status</td><td>"+sentBadge(h)+"</td></tr>";
  html += "</tbody></table>";
  html += "<div class='btn-row'><button class='btn btn-dark' id='det-close'>Close</button>"
        +" <button class='btn btn-accent' id='det-view' data-idx='"+h.rowIndex+"'>View License</button></div>";
  html += "</div></div>";
  root.innerHTML = html;
  document.getElementById("det-close").addEventListener("click", function(){ root.innerHTML=""; });
  document.getElementById("det-modal").addEventListener("click", function(e){ if(e.target===this) root.innerHTML=""; });
  document.getElementById("det-view").addEventListener("click", function(){
    var idx = parseInt(this.dataset.idx);
    var horse = S.horses.find(function(h){ return h.rowIndex === idx; });
    if(horse) showLicenseModal(horse);
  });
}

// ===== EMAIL =====
function sendLicenseEmail(rowIdx, btn){
  var horse = S.horses.find(function(h){ return h.rowIndex === rowIdx; });
  if(!horse){ alert("License not found"); return; }
  if(!horse.riderEmail){ alert("No email address on file."); return; }
  var orig = btn.textContent;
  btn.textContent = "Sending..."; btn.disabled = true;
  fetch(CONFIG.proxyUrl + "?action=sendLicense&rowIdx="+rowIdx+"&ts="+Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.success){
        btn.textContent = "Sent!"; btn.classList.add("btn-green");
        horse.sentStatus = "sent"; horse.sentRaw = "sent";
        setTimeout(function(){ btn.textContent = orig; btn.disabled = false; btn.classList.remove("btn-green"); }, 3000);
      } else {
        btn.textContent = "Failed";
        alert("Error: "+(data.error||"Unknown error"));
        setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 2000);
      }
    })
    .catch(function(e){
      btn.textContent = "Error";
      alert("Network error: "+e.message);
      setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 2000);
    });
}

function sendBatchLicenses(rowIdxs, btn){
  var orig = btn.textContent;
  var total = rowIdxs.length, sent = 0, failed = 0, failedNames = [];
  btn.disabled = true;
  function sendNext(i){
    if(i >= total){
      btn.textContent = "Done! Sent "+sent+"/"+total;
      if(failed > 0) alert(failed+" failed:\n"+failedNames.join("\n"));
      setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 4000);
      return;
    }
    var idx = rowIdxs[i];
    var horse = S.horses.find(function(h){ return h.rowIndex === idx; });
    btn.textContent = "Sending "+(i+1)+"/"+total+(horse?" — "+horse.horse:"")+"...";
    fetch(CONFIG.proxyUrl + "?action=sendLicense&rowIdx="+idx+"&ts="+Date.now())
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.success){ sent++; if(horse){ horse.sentStatus="sent"; horse.sentRaw="sent"; } }
        else { failed++; failedNames.push((horse?horse.horse+"  ("+horse.owner+")":"#"+idx)+": "+(data.error||"error")); }
        setTimeout(function(){ sendNext(i+1); }, 800);
      })
      .catch(function(e){
        failed++; failedNames.push((horse?horse.horse:"#"+idx)+": network error");
        setTimeout(function(){ sendNext(i+1); }, 800);
      });
  }
  sendNext(0);
}

// ===== LOAD =====
function autoLoad(){
  showView("loading");
  fetch(CONFIG.proxyUrl + "?type=" + CONFIG.sheetType + "&ts=" + Date.now())
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(data){
      if(!data || !data.horses) throw new Error("Unexpected response — missing horses array.");
      S.horses = parseHorseJSON(data);
      showView("lookup");
    })
    .catch(function(e){
      console.error("Load error:", e);
      document.getElementById("loading-view").innerHTML =
        "<div class='card'>"
        +"<p class='empty' style='color:var(--red)'>Could not load from Google Drive.</p>"
        +"<p style='text-align:center;font-size:.8rem;color:var(--muted);margin-top:.5rem'>"+esc(e.message)+"</p>"
        +"<div class='btn-row' style='justify-content:center;margin-top:1rem'>"
        +"<button class='btn btn-accent' onclick='autoLoad()'>Retry</button>"
        +"<label class='btn btn-dark' style='cursor:pointer'>Upload xlsx Instead"
        +"<input type='file' accept='.xlsx,.xls,.csv' id='file-upload-fallback' style='display:none'></label>"
        +"</div>"
        +"<p style='text-align:center;margin-top:.75rem;font-size:.75rem;color:var(--muted)'>"
        +"Note: uploading a file skips the member merge.</p>"
        +"</div>";
      var fu = document.getElementById("file-upload-fallback");
      if(fu) fu.addEventListener("change", function(ev){
        var file = ev.target.files[0]; if(!file) return;
        var reader = new FileReader();
        reader.onload = function(e2){
          var wb = XLSX.read(new Uint8Array(e2.target.result), { type:"array" });
          S.horses = parseHorseXLSX(wb);
          showView("lookup");
        };
        reader.readAsArrayBuffer(file);
      });
    });
}

// Set logo and boot
document.getElementById("hdr-logo").src = LOGO_IMG;
autoLoad();
</script>
