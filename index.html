<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoWN Year-End Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0F1923;--card:#1A2733;--accent:#D4A04A;--accent2:#C17F24;--text:#E8DCC8;--muted:#8A9AAD;--border:#2A3A4A}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.hero{text-align:center;margin-bottom:3rem}
.hero h1{font-family:'Oswald',sans-serif;font-size:3.5rem;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;line-height:1.1}
.hero h1 span{display:block;font-size:1.2rem;font-weight:400;color:var(--muted);letter-spacing:.15em;margin-top:.5rem}
.hero p{color:var(--muted);margin-top:1rem;font-size:1.05rem;max-width:500px;margin-left:auto;margin-right:auto}
.divider{width:80px;height:3px;background:var(--accent);margin:1.5rem auto;border-radius:2px}
.years{display:flex;flex-wrap:wrap;gap:1.25rem;justify-content:center;max-width:700px}
.year-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem 2.5rem;text-decoration:none;color:var(--text);transition:all .25s ease;min-width:180px;text-align:center;position:relative;overflow:hidden}
.year-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transition:transform .3s ease;transform-origin:left}
.year-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.year-card:hover::before{transform:scaleX(1)}
.year-card .yr{font-family:'Oswald',sans-serif;font-size:2.4rem;font-weight:700;color:var(--accent);line-height:1}
.year-card .label{font-size:.85rem;color:var(--muted);margin-top:.5rem;letter-spacing:.05em}
.year-card.current{border-color:var(--accent);background:linear-gradient(135deg,var(--card) 0%,#1E3040 100%)}
.year-card.current .label{color:var(--accent)}
.badge{display:inline-block;background:var(--accent);color:var(--bg);font-size:.65rem;font-weight:700;padding:.15rem .5rem;border-radius:10px;margin-top:.5rem;letter-spacing:.05em;text-transform:uppercase}
.footer{margin-top:3rem;text-align:center;color:var(--muted);font-size:.8rem}
.footer a{color:var(--accent);text-decoration:none}

@media(max-width:600px){
  .hero h1{font-size:2.4rem}
  .years{flex-direction:column;align-items:center}
  .year-card{width:100%;max-width:280px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>CoWN<span>Year-End Results</span></h1>
  <div class="divider"></div>
  <p>Select a year to view standings, qualifiers, merit points, and more.</p>
</div>

<div class="years">
  <a href="2026.html" class="year-card current">
    <div class="yr">2026</div>
    <div class="label">Current Season</div>
    <div class="badge">Live</div>
  </a>
  <!--
  <a href="2027.html" class="year-card">
    <div class="yr">2027</div>
    <div class="label">Year-End Results</div>
  </a>
  -->
</div>

<div class="footer">
  <p>To add a new year: duplicate the current year's HTML, update the proxy URL & password, and uncomment a new card above.</p>
</div>

</body>
</html>
