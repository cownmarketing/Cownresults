<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoWN Membership Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#D4A04A;--green:#27ae60;--red:#e74c3c;--text:#e0e0e0;--muted:#888;--border:#2a2a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--card);border-bottom:2px solid var(--accent);padding:.75rem 1.5rem;text-align:center}
.hdr img{height:48px}
.hdr span{display:block;font-family:'Oswald',sans-serif;font-size:.85rem;color:var(--accent);letter-spacing:.08em;margin-top:.15rem}
.tabs{display:flex;gap:.25rem;background:var(--card);padding:.25rem .5rem;border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:nowrap}
.tab{background:none;border:none;color:var(--muted);padding:.5rem .75rem;cursor:pointer;font-size:.8rem;font-family:'Oswald',sans-serif;white-space:nowrap;border-radius:4px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);background:rgba(212,160,74,.1)}
.main{max-width:1100px;margin:0 auto;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card-hdr h2{font-family:'Oswald',sans-serif;color:var(--accent);font-size:1.3rem;margin-bottom:.25rem}
.card-hdr p{color:var(--muted);font-size:.85rem}
.search-wrap{position:relative;margin:.75rem 0}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-box{width:100%;padding:.6rem .6rem .6rem 2.2rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.9rem}
.search-box:focus{outline:none;border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.75rem;margin:.75rem 0}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center}
.stat .num{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700}
.stat .lbl{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.active-stat .num{color:var(--green)}
.warn-stat .num{color:var(--accent)}
.lapsed-stat .num{color:var(--red)}
.total-stat .num{color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.5rem;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Oswald',sans-serif;cursor:pointer;white-space:nowrap}
td{padding:.5rem;border-bottom:1px solid var(--border)}
.ctr{text-align:center}
.bold{font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-active{background:rgba(39,174,96,.15);color:var(--green)}
.badge-lapsed{background:rgba(231,76,60,.15);color:var(--red)}
.badge-expiring{background:rgba(212,160,74,.15);color:var(--accent)}
.btn{display:inline-block;padding:.4rem .8rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:'Source Sans 3',sans-serif}
.btn-accent{background:var(--accent);color:#1a1a1a}
.btn-dark{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:.25rem .5rem;font-size:.75rem}
.btn:disabled{opacity:.5;cursor:default}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.pills{display:flex;gap:.25rem;flex-wrap:wrap}
.pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.25rem .6rem;font-size:.75rem;cursor:pointer;color:var(--muted)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(212,160,74,.1)}
.pill .ct{font-weight:700}
.empty{color:var(--muted);text-align:center;padding:2rem}
.hidden{display:none!important}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:550px;width:100%;max-height:90vh;overflow-y:auto}
#pwd-gate{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
#pwd-gate div{background:var(--card);padding:2rem;border-radius:12px;text-align:center}
#pwd-input{padding:.5rem;margin:.5rem 0;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);text-align:center}
.renewal-group{margin-bottom:1rem}
.renewal-group h3{font-family:'Oswald',sans-serif;font-size:1rem;margin-bottom:.5rem}
.renewal-group.urgent h3{color:var(--red)}
.renewal-group.warning h3{color:var(--accent)}
@media print{body{background:#fff;color:#000}.mem-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>

function esc(s) { var t = String(s||""); return t.replace(/&/g,"&amp;").replace(/[<]/g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(d) {
  if (!d) return "\u2014";
  if (d instanceof Date) { return (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear(); }
  var s = String(d);
  if (s.indexOf("-") > -1) { var p = s.split("T")[0].split("-"); return parseInt(p[1])+"/"+parseInt(p[2])+"/"+p[0]; }
  return s;
}
function fmtPhone(p) {
  if (!p) return "";
  var s = String(p).replace(/[^0-9]/g,"");
  if (s.length === 10) return "("+s.slice(0,3)+") "+s.slice(3,6)+"-"+s.slice(6);
  return s;
}
function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v;
  var s = String(v).trim();
  if (!s || s === "\u2014" || s === "-") return null;
  var m1 = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m1) { var d1 = new Date(parseInt(m1[1]), parseInt(m1[2])-1, parseInt(m1[3])); if (!isNaN(d1.getTime())) return d1; }
  var m2 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (m2) { var d2 = new Date(parseInt(m2[3]), parseInt(m2[1])-1, parseInt(m2[2])); if (!isNaN(d2.getTime())) return d2; }
  var n = parseFloat(s);
  if (!isNaN(n) && n > 30000 && n < 60000) { var d3 = new Date((n - 25569) * 86400000); if (!isNaN(d3.getTime())) return d3; }
  return null;
}
function daysBetween(a, b) { return Math.round((b - a) / (1000*60*60*24)); }

function parseMemberData(wb) {
  var members = [];
  var shName = wb.SheetNames.find(function(n){ return n.toLowerCase().indexOf("membership") > -1; }) || wb.SheetNames[0];
  var raw = XLSX.utils.sheet_to_json(wb.Sheets[shName], {defval: null});
  for (var i = 0; i < raw.length; i++) {
    var row = raw[i];
    var lk = {};
    Object.keys(row).forEach(function(k){ lk[k.toLowerCase().trim()] = row[k]; });
    var first = (lk.first||"").toString().trim();
    var last = (lk.last||"").toString().trim();
    if (!first && !last) continue;
    var cownNum = parseInt(lk["cown #"]) || 0;
    var type = (lk.type||"General").toString().trim();
    var status = (lk.status||"Lapsed").toString().trim();
    var duration = parseInt(lk.duration) || 1;
    var renewDate = parseDate(lk["renewal date"]);
    var expDate = parseDate(lk["expiration date"]);
    var rawExp = lk["expiration date"];
    var email = (lk.recipient||lk.email||"").toString().trim();
    var phone = (lk["phone number"]||"").toString().trim();
    var address = (lk.address||"").toString().trim();
    var city = (lk.city||"").toString().trim();
    var state = (lk.state||"").toString().trim();
    var zip = (lk["zip code"]||"").toString().trim();
    var youthDOB = lk["youth dob"]||"";
    var age = lk.age||"";
    var l1Status = lk["l1 status/free year"]||"";
    var method = (lk["o"]||"").toString().trim().toLowerCase();
    var sent = (lk.sent||"").toString().trim();
    var shtx2025 = lk["check to shtx for 2025"]||"";
    var shtx2024 = lk["check to shtx for 2024"]||"";
    var shtx2023 = lk["check to shtx for 2023"]||"";
    var was2022 = lk["2022 member"]||"";
    var was2023 = lk["2023 member"]||"";
    var now = new Date();
    var daysToExp = expDate ? daysBetween(now, expDate) : null;
    if (status === "Active" && expDate && expDate < now) status = "Lapsed";
    if (status === "Lapsed" && expDate && expDate >= now) status = "Active";
    var expiring = status === "Active" && daysToExp !== null && daysToExp <= 60;
    members.push({
      first: first, last: last, fullName: first+" "+last, cownNum: cownNum,
      type: type, status: status, duration: duration,
      renewDate: renewDate, expDate: expDate, daysToExp: daysToExp, expiring: expiring,
      email: email, phone: phone, address: address, city: city, state: state, zip: zip,
      youthDOB: youthDOB, age: age, l1Status: l1Status,
      method: method==="o"?"Online":method==="ip"?"In Person":"",
      cardSent: !!sent, cardSentDate: sent,
      shtx2025: shtx2025, shtx2024: shtx2024, shtx2023: shtx2023, was2022: was2022, was2023: was2023
    });
  }
  console.log("Parsed "+members.length+" members, "+members.filter(function(m){return m.expDate;}).length+" have exp dates");
  return members.sort(function(a,b){ return a.last.localeCompare(b.last) || a.first.localeCompare(b.first); });
}

function statusBadge(s) { return "<span class=\"badge badge-"+(s==="Active"?"active":"lapsed")+"\">"+s+"</span>"; }
function typeBadge(t) { var c = {General:"accent",Youth:"green",Collegiate:"blue"}; return "<span class=\"badge badge-"+(c[t]||"active")+"\">"+t+"</span>"; }

function renderTabs() {
  var tabs = [{id:"lookup",l:"Member Lookup"}];
  if (S.adminUnlocked) {
    tabs.push({id:"dashboard",l:"Dashboard"},{id:"renewals",l:"Renewals"},{id:"cards",l:"Cards"},{id:"settings",l:"Settings"});
  }
  var h = tabs.map(function(t){ return "<button class=\"tab"+(S.view===t.id?" active":"")+"\" data-view=\""+t.id+"\">"+t.l+"</button>"; }).join("");
  if (!S.adminUnlocked) h += "<button class=\"tab\" id=\"admin-unlock-btn\" style=\"margin-left:auto;color:var(--muted)\">Admin</button>";
  document.getElementById("tabs").innerHTML = h;
  document.querySelectorAll(".tab").forEach(function(b){
    if (b.dataset.view) b.addEventListener("click", function(){ showView(b.dataset.view); });
  });
  var unlockBtn = document.getElementById("admin-unlock-btn");
  if (unlockBtn) unlockBtn.addEventListener("click", function(){ S.pendingView="dashboard"; document.getElementById("pwd-gate").classList.remove("hidden"); document.getElementById("pwd-input").focus(); });
}

function showView(v) {
  var needsPwd = ["dashboard","renewals","cards","settings"];
  if (needsPwd.indexOf(v) > -1 && !S.adminUnlocked) {
    S.pendingView = v;
    document.getElementById("pwd-gate").classList.remove("hidden");
    document.getElementById("pwd-input").focus();
    return;
  }
  S.view = v;
  ["loading","lookup","dashboard","renewals","cards","settings"].forEach(function(id){
    document.getElementById(id+"-view").classList.toggle("hidden", id !== v);
  });
  renderTabs();
  if (v === "lookup") renderLookup();
  if (v === "dashboard") renderDashboard();
  if (v === "renewals") renderRenewals();
  if (v === "cards") renderCards();
  if (v === "settings") renderSettings();
}

// ===== LOOKUP =====
function renderLookup() {
  var el = document.getElementById("lookup-view");
  var h = "<div class=\"card\"><div class=\"card-hdr\"><h2>Member Lookup</h2><p>Search by name or CoWN number</p></div>";
  h += "<div class=\"search-wrap\"><span class=\"search-icon\">&#128269;</span><input class=\"search-box\" id=\"lookup-q\" placeholder=\"Enter name or CoWN #...\"></div>";
  h += "<div id=\"lookup-results\"></div></div>";
  el.innerHTML = h;
  document.getElementById("lookup-q").addEventListener("input", function(){
    var q = this.value.trim().toLowerCase();
    var res = document.getElementById("lookup-results");
    if (q.length < 2) { res.innerHTML = ""; return; }
    var matches = S.members.filter(function(m){ return m.fullName.toLowerCase().indexOf(q) > -1 || String(m.cownNum).indexOf(q) > -1; });
    if (!matches.length) { res.innerHTML = "<p class=\"empty\">No members found</p>"; return; }
    var t = "<table><thead><tr><th>Name</th><th>CoWN #</th><th>Type</th><th>Status</th><th>Expires</th><th></th></tr></thead><tbody>";
    matches.slice(0,20).forEach(function(m){
      t += "<tr class=\"lookup-row\" data-num=\""+m.cownNum+"\"><td class=\"bold\">"+esc(m.fullName)+"</td><td class=\"ctr\">"+m.cownNum+"</td><td class=\"ctr\">"+typeBadge(m.type)+"</td><td class=\"ctr\">"+statusBadge(m.status)+"</td><td class=\"ctr\">"+fmtDate(m.expDate)+"</td><td><button class=\"btn btn-accent btn-sm lookup-card\" data-num=\""+m.cownNum+"\">View Card</button></td></tr>";
    });
    t += "</tbody></table>";
    res.innerHTML = t;
    res.querySelectorAll(".lookup-card").forEach(function(b){
      b.addEventListener("click", function(){ var mem = S.members.find(function(m){ return m.cownNum === parseInt(b.dataset.num); }); if (mem) showCardModal(mem); });
    });
  });
}

// ===== DASHBOARD =====
function renderDashboard() {
  var el = document.getElementById("dashboard-view");
  var active = S.members.filter(function(m){ return m.status==="Active"; });
  var lapsed = S.members.filter(function(m){ return m.status==="Lapsed"; });
  var expiring = S.members.filter(function(m){ return m.expiring; });
  var h = "<div class=\"card\"><div class=\"card-hdr\"><h2>Dashboard</h2></div>";
  h += "<div class=\"stats\">";
  h += "<div class=\"stat total-stat\"><div class=\"num\">"+S.members.length+"</div><div class=\"lbl\">Total</div></div>";
  h += "<div class=\"stat active-stat\"><div class=\"num\">"+active.length+"</div><div class=\"lbl\">Active</div></div>";
  h += "<div class=\"stat warn-stat\"><div class=\"num\">"+expiring.length+"</div><div class=\"lbl\">Expiring</div></div>";
  h += "<div class=\"stat lapsed-stat\"><div class=\"num\">"+lapsed.length+"</div><div class=\"lbl\">Lapsed</div></div>";
  h += "</div>";
  h += "<div class=\"search-wrap\"><span class=\"search-icon\">&#128269;</span><input class=\"search-box\" id=\"dash-q\" placeholder=\"Search members...\"></div>";
  h += "<div class=\"pills\" style=\"margin-bottom:.5rem\">";
  h += "<button class=\"pill active\" data-fs=\"all\">All</button>";
  h += "<button class=\"pill\" data-fs=\"Active\">Active</button>";
  h += "<button class=\"pill\" data-fs=\"Lapsed\">Lapsed</button>";
  h += "<button class=\"pill\" data-fs=\"expiring\">Expiring</button>";
  h += "</div>";
  h += "<div id=\"dash-table\"></div></div>";
  el.innerHTML = h;
  function renderTable() {
    var list = S.members;
    if (S.filterStatus !== "all") {
      if (S.filterStatus === "expiring") list = list.filter(function(m){ return m.expiring; });
      else list = list.filter(function(m){ return m.status === S.filterStatus; });
    }
    var q = (document.getElementById("dash-q")||{}).value;
    if (q) { q = q.trim().toLowerCase(); list = list.filter(function(m){ return m.fullName.toLowerCase().indexOf(q) > -1 || String(m.cownNum).indexOf(q) > -1; }); }
    var t = "<div style=\"overflow-x:auto\"><table><thead><tr><th>Name</th><th>CoWN #</th><th>Type</th><th>Status</th><th>Expires</th><th>Email</th></tr></thead><tbody>";
    list.slice(0,100).forEach(function(m){
      t += "<tr class=\"dash-row\" data-num=\""+m.cownNum+"\" style=\"cursor:pointer\"><td class=\"bold\">"+esc(m.fullName)+"</td><td class=\"ctr\">"+m.cownNum+"</td><td class=\"ctr\">"+typeBadge(m.type)+"</td><td class=\"ctr\">"+statusBadge(m.status)+"</td><td class=\"ctr\">"+fmtDate(m.expDate)+"</td><td>"+esc(m.email)+"</td></tr>";
    });
    t += "</tbody></table></div>";
    if (!list.length) t = "<p class=\"empty\">No members match</p>";
    document.getElementById("dash-table").innerHTML = t;
    document.querySelectorAll(".dash-row").forEach(function(r){
      r.addEventListener("click", function(){ var mem = S.members.find(function(m){ return m.cownNum === parseInt(r.dataset.num); }); if (mem) showDetailModal(mem); });
    });
  }
  renderTable();
  document.getElementById("dash-q").addEventListener("input", renderTable);
  el.querySelectorAll("[data-fs]").forEach(function(b){
    b.addEventListener("click", function(){
      S.filterStatus = b.dataset.fs;
      el.querySelectorAll("[data-fs]").forEach(function(p){ p.classList.remove("active"); });
      b.classList.add("active");
      renderTable();
    });
  });
}

// ===== RENEWALS =====
function renderRenewals() {
  var el = document.getElementById("renewals-view");
  var now = new Date();
  var exp30 = S.members.filter(function(m){ return m.status==="Active" && m.daysToExp!==null && m.daysToExp>=0 && m.daysToExp<=30; });
  var exp60 = S.members.filter(function(m){ return m.status==="Active" && m.daysToExp!==null && m.daysToExp>30 && m.daysToExp<=60; });
  var exp90 = S.members.filter(function(m){ return m.status==="Active" && m.daysToExp!==null && m.daysToExp>60 && m.daysToExp<=90; });
  var recent = S.members.filter(function(m){ return m.status==="Lapsed" && m.daysToExp!==null && m.daysToExp>=-90 && m.daysToExp<0; });
  var h = "<div class=\"card\"><div class=\"card-hdr\"><h2>Renewals</h2><p>Members expiring or recently lapsed</p></div>";
  function grp(title, list, cls) {
    if (!list.length) return "";
    var g = "<div class=\"renewal-group "+cls+"\"><h3>"+title+" ("+list.length+")</h3><table><thead><tr><th>Name</th><th>CoWN #</th><th>Expires</th><th>Email</th></tr></thead><tbody>";
    list.forEach(function(m){ g += "<tr><td class=\"bold\">"+esc(m.fullName)+"</td><td class=\"ctr\">"+m.cownNum+"</td><td class=\"ctr\">"+fmtDate(m.expDate)+"</td><td>"+esc(m.email)+"</td></tr>"; });
    g += "</tbody></table></div>";
    return g;
  }
  h += grp("Expiring in 30 days", exp30, "urgent");
  h += grp("Expiring in 30-60 days", exp60, "warning");
  h += grp("Expiring in 60-90 days", exp90, "");
  h += grp("Recently Lapsed (last 90 days)", recent, "urgent");
  if (!exp30.length && !exp60.length && !exp90.length && !recent.length) h += "<p class=\"empty\">No upcoming renewals</p>";
  h += "</div>";
  el.innerHTML = h;
}

// ===== CARDS =====
function renderCards() {
  var el = document.getElementById("cards-view");
  var active = S.members.filter(function(m){ return m.status==="Active"; });
  var activeSent = active.filter(function(m){ return m.cardSent; });
  var activeUnsent = active.filter(function(m){ return !m.cardSent && m.email; });
  var activeNoEmail = active.filter(function(m){ return !m.cardSent && !m.email; });
  var h = "<div class=\"card\"><div class=\"card-hdr\"><h2>Membership Cards</h2><p>Generate and email cards for active members</p></div>";
  h += "<div class=\"stats\" style=\"margin-bottom:1rem\">";
  h += "<div class=\"stat active-stat\"><div class=\"num\">"+activeSent.length+"</div><div class=\"lbl\">Cards Sent</div></div>";
  h += "<div class=\"stat warn-stat\"><div class=\"num\">"+activeUnsent.length+"</div><div class=\"lbl\">Need to Send</div></div>";
  h += "<div class=\"stat lapsed-stat\"><div class=\"num\">"+activeNoEmail.length+"</div><div class=\"lbl\">No Email</div></div>";
  h += "</div>";
  h += "<div class=\"search-wrap\"><span class=\"search-icon\">&#128269;</span><input class=\"search-box\" id=\"card-q\" placeholder=\"Search active members...\"></div>";
  h += "<div class=\"pills\" style=\"margin-bottom:.75rem\">";
  h += "<button class=\"pill active\" data-cf=\"all\">All Active <span class=\"ct\">("+active.length+")</span></button>";
  h += "<button class=\"pill\" data-cf=\"unsent\">Needs Card <span class=\"ct\">("+activeUnsent.length+")</span></button>";
  h += "<button class=\"pill\" data-cf=\"sent\">Already Sent <span class=\"ct\">("+activeSent.length+")</span></button>";
  h += "<button class=\"pill\" data-cf=\"noemail\">No Email <span class=\"ct\">("+activeNoEmail.length+")</span></button>";
  h += "</div>";
  h += "<div class=\"btn-row\" style=\"margin-bottom:1rem\">";
  h += "<button class=\"btn btn-accent\" id=\"batch-cards\">Print All Active Cards</button>";
  if (activeUnsent.length > 0) h += "<button class=\"btn btn-green\" id=\"batch-email\">&#9993; Email "+activeUnsent.length+" Unsent Cards</button>";
  else h += "<button class=\"btn btn-dark\" id=\"batch-email-resend\">&#9993; Resend All Cards</button>";
  h += "</div>";
  h += "<div id=\"card-results\"></div></div>";
  el.innerHTML = h;
  var cardFilter = "all";
  function renderCardList(q) {
    var list = active;
    if (cardFilter === "unsent") list = activeUnsent;
    else if (cardFilter === "sent") list = activeSent;
    else if (cardFilter === "noemail") list = activeNoEmail;
    if (q) list = list.filter(function(m){ return m.fullName.toLowerCase().indexOf(q) > -1 || String(m.cownNum).indexOf(q) > -1; });
    var res = document.getElementById("card-results");
    if (!list.length) { res.innerHTML = "<p class=\"empty\">No members match</p>"; return; }
    var t = "<div style=\"overflow-x:auto\"><table><thead><tr><th>Name</th><th>CoWN #</th><th>Type</th><th>Expires</th><th>Card Status</th><th></th></tr></thead><tbody>";
    list.slice(0,50).forEach(function(m) {
      t += "<tr><td class=\"bold\">"+esc(m.fullName)+"</td><td class=\"ctr\">"+m.cownNum+"</td><td class=\"ctr\">"+typeBadge(m.type)+"</td>";
      t += "<td class=\"ctr\">"+fmtDate(m.expDate)+"</td>";
      t += "<td class=\"ctr\">"+(m.cardSent?"<span class=\"badge badge-active\">&#10003; Sent</span>":m.email?"<span class=\"badge badge-expiring\">Pending</span>":"<span class=\"badge badge-lapsed\">No Email</span>")+"</td>";
      t += "<td><button class=\"btn btn-dark btn-sm gen-card\" data-num=\""+m.cownNum+"\">&#127474; View</button>";
      if (m.email && !m.cardSent) t += " <button class=\"btn btn-sm btn-green send-one-email\" data-num=\""+m.cownNum+"\">&#9993; Send</button>";
      else if (m.email && m.cardSent) t += " <button class=\"btn btn-sm btn-dark send-one-email\" data-num=\""+m.cownNum+"\">&#9993; Resend</button>";
      t += "</td></tr>";
    });
    t += "</tbody></table></div>";
    res.innerHTML = t;
    res.querySelectorAll(".gen-card").forEach(function(b){ b.addEventListener("click", function(){ var mem = S.members.find(function(m){ return m.cownNum === parseInt(b.dataset.num); }); if (mem) showCardModal(mem); }); });
    res.querySelectorAll(".send-one-email").forEach(function(b){ b.addEventListener("click", function(){ sendCardEmail(parseInt(this.dataset.num), this); }); });
  }
  renderCardList("");
  document.getElementById("card-q").addEventListener("input", function(){ renderCardList(this.value.trim().toLowerCase()); });
  el.querySelectorAll("[data-cf]").forEach(function(b){
    b.addEventListener("click", function(){
      cardFilter = b.dataset.cf;
      el.querySelectorAll("[data-cf]").forEach(function(p){ p.classList.remove("active"); });
      b.classList.add("active");
      renderCardList((document.getElementById("card-q")||{value:""}).value.trim().toLowerCase());
    });
  });
  document.getElementById("batch-cards").addEventListener("click", function(){
    var win = window.open("","","width=450,height=700");
    win.document.write("<!DOCTYPE html><html><head><link href=\"https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap\" rel=\"stylesheet\"><style>body{font-family:Source Sans 3,sans-serif;padding:1rem;background:#fff;color:#333}@media print{.card-page{page-break-after:always}.mem-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}}.card-page{max-width:500px;margin:0 auto 2rem;padding:2rem}</style></head><body>");
    active.forEach(function(m){
      win.document.write("<div class=\"card-page\">" + buildCardHTML(m) + buildWelcomeHTML(m) + "</div>");
    });
    win.document.write("</body></html>");
    win.document.close();
    setTimeout(function(){ win.print(); }, 500);
  });
  var batchEmailBtn = document.getElementById("batch-email");
  if (batchEmailBtn) {
    batchEmailBtn.addEventListener("click", function(){
      if (!activeUnsent.length) { alert("All active members with emails have already been sent cards!"); return; }
      if (!confirm("Send membership cards to "+activeUnsent.length+" members who have not received one yet?")) return;
      var nums = activeUnsent.map(function(m){ return m.cownNum; });
      sendBatchEmails(nums, this);
    });
  }
  var resendBtn = document.getElementById("batch-email-resend");
  if (resendBtn) {
    resendBtn.addEventListener("click", function(){
      var withEmail = active.filter(function(m){ return m.email; });
      if (!withEmail.length) { alert("No active members with email addresses."); return; }
      if (!confirm("Resend membership cards to all "+withEmail.length+" active members with emails?")) return;
      var nums = withEmail.map(function(m){ return m.cownNum; });
      sendBatchEmails(nums, this, true);
    });
  }
}

function renderSettings() {
  var el = document.getElementById("settings-view");

  var h = "<div class=\"card\"><div class=\"card-hdr\"><h2>Settings</h2></div>";
  h += "<div class=\"stats\">";

  h += "<div class=\"stat active-stat\"><div class=\"num\">"+active.length+"</div><div class=\"lbl\">Active</div></div>";
  h += "<div class=\"stat lapsed-stat\"><div class=\"num\">"+S.members.filter(function(m){return !m.email;}).length+"</div><div class=\"lbl\">Missing Email</div></div>";
  h += "</div>";
  h += "<div class=\"btn-row\"><button class=\"btn btn-accent\" id=\"reload-btn\">Reload from Google Drive</button>";
  h += "<label class=\"btn btn-dark\" style=\"cursor:pointer\">Upload File<input type=\"file\" accept=\".xlsx,.xls,.csv\" id=\"file-upload\" style=\"display:none\"></label></div>";
  h += "<div class=\"btn-row\" style=\"margin-top:1rem\"><button class=\"btn btn-dark dl-btn\" data-type=\"all\">Download All Members</button>";
  h += "<button class=\"btn btn-dark dl-btn\" data-type=\"active\">Download Active</button></div></div>";
  el.innerHTML = h;
  document.getElementById("reload-btn").addEventListener("click", function(){ autoLoad(); });
  document.getElementById("file-upload").addEventListener("change", function(e){
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var wb = XLSX.read(new Uint8Array(ev.target.result), {type:"array"});
      S.members = parseMemberData(wb);
      showView("dashboard");
    };
    reader.readAsArrayBuffer(file);
  });
  el.querySelectorAll(".dl-btn").forEach(function(b){
    b.addEventListener("click", function(){
      var list = b.dataset.type === "active" ? S.members.filter(function(m){ return m.status==="Active"; }) : S.members;
      var data = list.map(function(m){ return {First:m.first,Last:m.last,"CoWN #":m.cownNum,Type:m.type,Status:m.status,Expires:fmtDate(m.expDate),Email:m.email,Phone:m.phone}; });
      var ws = XLSX.utils.json_to_sheet(data);
      var wb2 = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb2, ws, "Members");
      XLSX.writeFile(wb2, "CoWN_Members_"+b.dataset.type+".xlsx");
    });
  });
}

// ===== MODALS =====
function showCardModal(m) {
  var root = document.getElementById("modal-root");
  var h = "<div class=\"modal-overlay\" id=\"card-modal\"><div class=\"modal\">";
  h += buildCardHTML(m);
  h += buildWelcomeHTML(m);
  h += "<div class=\"btn-row\" style=\"margin-top:1rem\"><button class=\"btn btn-dark\" id=\"card-close\">Close</button> <button class=\"btn btn-accent\" id=\"card-print\">&#128424; Print / Save PDF</button>";
  if (S.adminUnlocked && m.email) h += " <button class=\"btn btn-green\" id=\"card-email\" data-num=\""+m.cownNum+"\">&#9993; Email Card</button>";
  if (S.adminUnlocked && !m.email) h += " <span style=\"font-size:.75rem;color:var(--red)\">No email on file</span>";
  h += "</div></div></div>";
  root.innerHTML = h;
  document.getElementById("card-close").addEventListener("click", function(){ root.innerHTML = ""; });
  document.getElementById("card-modal").addEventListener("click", function(e){ if (e.target === this) root.innerHTML = ""; });
  document.getElementById("card-print").addEventListener("click", function(){
    var win = window.open("","","width=450,height=700");
    win.document.write("<!DOCTYPE html><html><head><link href=\"https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap\" rel=\"stylesheet\"><style>body{font-family:Source Sans 3,sans-serif;padding:2rem;background:#fff;color:#333}@media print{.mem-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>");
    win.document.write(buildCardHTML(m));
    win.document.write(buildWelcomeHTML(m));
    win.document.write("</body></html>");
    win.document.close();
    setTimeout(function(){ win.print(); }, 500);
  });
  var emailBtn = document.getElementById("card-email");
  if (emailBtn) emailBtn.addEventListener("click", function(){ sendCardEmail(parseInt(this.dataset.num), this); });
}

// ===== EMAIL FUNCTIONS =====
function sendCardEmail(cownNum, btn) {
  if (!CONFIG.emailProxyUrl || CONFIG.emailProxyUrl.indexOf("PASTE") > -1) { alert("Email script URL not configured."); return; }
  var orig = btn.textContent;
  btn.textContent = "Sending..."; btn.disabled = true;
  fetch(CONFIG.emailProxyUrl + "?action=send&cownNum=" + cownNum)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.success) {
        btn.textContent = "Sent!"; btn.classList.add("btn-green");
        var mem = S.members.find(function(m){ return m.cownNum === cownNum; });
        if (mem) { mem.cardSent = true; mem.cardSentDate = "sent"; }
        setTimeout(function(){ btn.textContent = orig; btn.disabled = false; btn.classList.remove("btn-green"); }, 3000);
      } else {
        btn.textContent = "Failed"; alert("Error: "+(data.error||"Unknown"));
        setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 2000);
      }
    })
    .catch(function(e){
      btn.textContent = "Error"; alert("Network error: "+e.message);
      setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 2000);
    });
}
function sendBatchEmails(cownNums, btn, force) {
  if (!CONFIG.emailProxyUrl || CONFIG.emailProxyUrl.indexOf("PASTE") > -1) { alert("Email script URL not configured."); return; }
  var orig = btn.textContent;
  btn.textContent = "Sending 0/"+cownNums.length+"..."; btn.disabled = true;
  var url = CONFIG.emailProxyUrl + "?action=sendBatch&nums=" + cownNums.join(",");
  if (force) url += "&force=true";
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      btn.textContent = "Sent "+data.sent+"/"+data.total;
      if (data.failed > 0) alert(data.failed + " failed to send.");
      setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 4000);
    })
    .catch(function(e){
      btn.textContent = "Error"; alert("Network error: "+e.message);
      setTimeout(function(){ btn.textContent = orig; btn.disabled = false; }, 2000);
    });
}

// ===== LOAD =====
function autoLoad() {
  showView("loading");
  var url = CONFIG.proxyUrl + "?type=membership&ts=" + Date.now();
  fetch(url).then(function(r){
    if (!r.ok) throw new Error("HTTP "+r.status);
    return r.text();
  }).then(function(b64){
    var bin = atob(b64);
    var arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    var wb = XLSX.read(arr, {type:"array"});
    S.members = parseMemberData(wb);
    showView("lookup");
  }).catch(function(e){
    console.error("Load error:", e);
    document.getElementById("loading-view").innerHTML = "<div class=\"card\"><p class=\"empty\">Could not load data. <button class=\"btn btn-accent\" onclick=\"autoLoad()\">Retry</button></p><p style=\"text-align:center;margin-top:.5rem;font-size:.8rem;color:var(--muted)\">Or use Settings to upload a file.</p></div>";
  });
}
autoLoad();
</script>
